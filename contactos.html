            </section>
        </header>
        
        <main class="container">
            
            <h2 class="mb-5 pb-3">ENVIA UMA MENSAGEM</h2>

            <section id="formulario" class="container-fluid">
                <div class="row">
                    <div class="col-12 col-lg-7 bg-dark p-3 mb-3">
                        <form>
                            <div class="row mb-3">
                                <div class="col-12 col-lg-6 mb-3">
                                    <label for="nome" class="form-label">NOME</label>
                                    <input type="text" class="form-control bg-secondary text-white" id="nome" placeholder="Nome" required>
                                    <div class="invalid-feedback">
                                        Looks good!
                                    </div>
                                </div>
                                <div class="col-12 col-lg-6">
                                    <label for="apelido" class="form-label">APELIDO</label>
                                    <input type="text" class="form-control text-bg-secondary" id="apelido" placeholder="Apelido" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-12 col-lg-4 mb-3">
                                    <label for="nascimento" class="form-label">DATA DE NASCIMENTO</label>
                                    <input type="date" class="form-control bg-secondary text-white" id="nascimento" required>
                                </div>
                                <div class="col-12 offset-lg-2 col-lg-6">
                                    <label for="telefone" class="form-label">TELEFONE</label>
                                    <input type="tel" class="form-control bg-secondary text-white" id="telefone" placeholder="912345678" required> 
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-12 mb-3">
                                    <label for="email" class="form-label">EMAIL</label>
                                    <input type="email" class="form-control bg-secondary text-white" id="email" placeholder="exemplo@exemplo.com" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-12 mb-3">
                                    <label for="mensagem" class="form-label">MENSAGEM</label>
                                    <textarea id="mensagem" class="form-control bg-secondary text-white" rows="4" placeholder="Escreve aqui a tua mensagem" required></textarea>
                                </div>
                            </div>
                            <button class="btn std-btn btn-lg" type="submit">Enviar</button>
                        </form>
                    </div>
                    <div class="col-12 col-lg-5 bg-dark pt-4 mb-3">
                        <img src="imagens/logo_am.png" alt="logo_am" class="img-fluid">
                    </div>
                </div>
            </section>
            
        </main>

                            <li><a href="https://www.instagram.com/arcticmonkeys/" aria-label="Instagram"><i class='fab fa-instagram'></i></a></li>
                            <li><a href="https://wa.me/912345678" aria-label="Contacto telefónico"><i class="fas fa-phone"></i></a></li>
                        </ul>
                    </nav>
                </div>
